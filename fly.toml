# fly.toml app configuration file generated for pladuk-server on 2026-02-28T17:00:05+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pladuk-server'
primary_region = 'sin'

[build]
  dockerfile = 'apps/server/Dockerfile'

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
